name: Release Builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            artifact: windows-x64
            script: npm run dist:win:x64
          - name: Windows x86
            os: windows-latest
            artifact: windows-ia32
            script: npm run dist:win:ia32
          - name: Windows ARM64
            os: windows-latest
            artifact: windows-arm64
            script: npm run dist:win:arm64
          - name: Linux x64
            os: ubuntu-latest
            artifact: linux-x64
            script: npm run dist:linux:x64
          - name: Linux ARM64
            os: ubuntu-latest
            artifact: linux-arm64
            script: npm run dist:linux:arm64
          - name: macOS Universal
            os: macos-latest
            artifact: macos-universal
            script: npm run dist:mac:universal

    env:
      WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Decode Windows signing certificate
        if: runner.os == 'Windows' && env.WINDOWS_CERTIFICATE_BASE64 != ''
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "windows-signing-cert.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
          "WIN_CSC_LINK=$certPath" >> $env:GITHUB_ENV
          "WIN_CSC_KEY_PASSWORD=$env:WINDOWS_CERTIFICATE_PASSWORD" >> $env:GITHUB_ENV
          "CSC_LINK=$certPath" >> $env:GITHUB_ENV
          "CSC_KEY_PASSWORD=$env:WINDOWS_CERTIFICATE_PASSWORD" >> $env:GITHUB_ENV

      - name: Configure Windows signing certificate link
        if: runner.os == 'Windows' && env.WINDOWS_CERTIFICATE_BASE64 == '' && env.WIN_CSC_LINK != ''
        shell: pwsh
        run: |
          "CSC_LINK=$env:WIN_CSC_LINK" >> $env:GITHUB_ENV
          "CSC_KEY_PASSWORD=$env:WIN_CSC_KEY_PASSWORD" >> $env:GITHUB_ENV

      - name: Build packages
        run: ${{ matrix.script }}
        env:
          # electron-builder reads these automatically when present. Signing and
          # notarization are skipped when the repository secrets are not set.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rigscope-${{ matrix.artifact }}-${{ github.run_number }}
          path: |
            release/**
            !release/**/builder-debug.yml
            !release/**/builder-effective-config.yaml
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.msi
            release/*.blockmap
            release/*.AppImage
            release/*.deb
            release/*.tar.gz
            release/*.dmg
            release/*.zip
            release/latest*.yml
            release/latest*.yaml
